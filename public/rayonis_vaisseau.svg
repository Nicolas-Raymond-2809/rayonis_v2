<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Core Colors -->
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="thrust-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#701a75;stop-opacity:0" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shield (Hexagon) -->
  <path d="M400 100 L680 240 L680 520 L400 660 L120 520 L120 240 Z" 
        fill="none" 
        stroke="#d946ef" 
        stroke-width="12" 
        filter="url(#soft-glow)"
        opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Spaceship Group (Centered) -->
  <g transform="translate(400, 320) scale(0.9)">
    <!-- Propulsion Trail -->
    <path d="M-40 80 L0 260 L40 80 L0 100 Z" fill="url(#thrust-grad)" opacity="0.7">
      <animate attributeName="d" 
               values="M-40 80 L0 260 L40 80 L0 100 Z; M-50 80 L0 320 L50 80 L0 110 Z; M-40 80 L0 260 L40 80 L0 100 Z" 
               dur="1.2s" repeatCount="indefinite" />
    </path>

    <!-- Back Fins -->
    <path d="M-120 50 L0 -30 L120 50 L0 30 Z" fill="#1e1b4b" stroke="#d946ef" stroke-width="3" filter="url(#soft-glow)"/>

    <!-- Main Body -->
    <path d="M0 -240 L80 80 L0 40 L-80 80 Z" 
          fill="url(#body-grad)" 
          stroke="#fff" 
          stroke-width="6"
          stroke-linejoin="round"
          filter="url(#neon-glow)"/>

    <!-- Cockpit -->
    <path d="M0 -180 C20 -180, 25 -120, 0 -80 C-25 -120, -20 -180, 0 -180" 
          fill="#fff" 
          opacity="1"/>
    
    <!-- Wing Detail -->
    <path d="M-60 60 L-20 -40 L-10 40 Z" fill="#fff" opacity="0.3"/>
    <path d="M60 60 L20 -40 L10 40 Z" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Title Text -->
  <g transform="translate(400, 680)">
    <text text-anchor="middle" font-family="'Inter', sans-serif" font-weight="900" font-size="90" fill="#fff" letter-spacing="15" filter="url(#soft-glow)">
      RAYONIS
    </text>
    <path d="M-280 30 L280 30" stroke="url(#body-grad)" stroke-width="6" opacity="0.6" stroke-linecap="round" />
  </g>
</svg>
